name: Node.js CI/CD

on:  
  push:  
    branches:  
      - main

jobs:  
  build:  
    runs-on: ubuntu-latest

    steps:  
      - name: Checkout code  
        uses: actions/checkout@v2

      - name: Set up Node.js  
        uses: actions/setup-node@v2  
        with:  
          node-version: '18'

      - name: Install dependencies  
        run: npm install

      - name: Build Docker image  
        run: docker build -t denuwansathsara/payment-service .

      - name: Push Docker image to Docker Hub  
        run: |  
          echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin  
          docker push denuwansathsara/payment-service:latest